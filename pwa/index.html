<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>隨時資料庫</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-text: #04202e;
    --ok: #4ade80;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Segoe UI", sans-serif;
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    max-width: 480px; margin: 0 auto;
  }
  h1 {
    font-size: 20px; font-weight: 700; margin: 20px 0 4px;
  }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 14px;
  }
  .card h2 {
    font-size: 13px; color: var(--muted); font-weight: 600;
    margin: 0 0 10px; text-transform: uppercase; letter-spacing: .03em;
  }

  .course-toolbar { display: flex; gap: 8px; margin-bottom: 10px; }
  .course-toolbar input {
    flex: 1; min-width: 0; padding: 9px 14px; border-radius: 999px;
    border: 1px solid var(--border); background: #0f172a; color: var(--text); font-size: 14px;
  }
  .add-course-btn {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--accent); background: transparent; color: var(--accent);
    font-size: 20px; line-height: 1; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  .course-recent { margin-bottom: 10px; }
  .course-recent .label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .03em; margin-bottom: 6px; display: block;
  }
  .course-recent .course-list { margin-bottom: 0; }

  .course-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .course-chip {
    border: 1px solid var(--border); background: transparent; color: var(--text);
    padding: 8px 14px; border-radius: 999px; font-size: 14px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .course-chip.active {
    background: var(--accent); color: var(--accent-text); border-color: var(--accent);
    font-weight: 700;
  }

  .cleanup-card { border-color: #fbbf24; }
  .cleanup-card h2 { color: #fbbf24; }
  ul.cleanup-list { list-style: none; margin: 0; padding: 0; }
  ul.cleanup-list li {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  ul.cleanup-list li:last-child { border-bottom: none; }
  ul.cleanup-list .hint { color: var(--muted); font-size: 11px; display: block; margin-top: 2px; }
  .dismiss-cleanup-btn {
    flex-shrink: 0; border: 1px solid var(--border); color: var(--muted); background: none;
    padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }

  .camera-btn {
    width: 100%; padding: 22px; border-radius: 16px; border: none;
    background: var(--accent); color: var(--accent-text);
    font-size: 18px; font-weight: 700; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .camera-btn:disabled { opacity: .5; }
  .camera-btn .icon { font-size: 22px; }

  .status-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--muted); margin-top: 10px;
  }
  .status-row.warn { color: #fbbf24; }

  ul.log { list-style: none; margin: 0; padding: 0; }
  ul.log li {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  ul.log li:last-child { border-bottom: none; }
  ul.log .name { color: var(--text); }
  ul.log .state.ok { color: var(--ok); }
  ul.log .state.pending { color: var(--muted); }
  ul.log .state.err { color: var(--err); }
  .empty { color: var(--muted); font-size: 13px; padding: 6px 0; }

  .footer-links {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    margin: 18px 0 30px;
  }
  .footer-dot { color: var(--border); font-size: 12px; }
  .settings-link {
    text-align: center; color: var(--muted); font-size: 12px;
    text-decoration: underline; background: none; border: none;
  }

  ul.manage-course-list { list-style: none; margin: 0; padding: 0; max-height: 50vh; overflow-y: auto; }
  ul.manage-course-list li {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  ul.manage-course-list li:last-child { border-bottom: none; }
  ul.manage-course-list .manage-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .delete-course-btn {
    flex-shrink: 0; border: 1px solid var(--err); color: var(--err); background: none;
    padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  .browse-course-btn {
    flex-shrink: 0; border: 1px solid var(--accent); color: var(--accent); background: none;
    padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }

  ul.browse-course-list { list-style: none; margin: 0; padding: 0; max-height: 50vh; overflow-y: auto; }
  ul.browse-course-list li { border-bottom: 1px solid var(--border); }
  ul.browse-course-list li:last-child { border-bottom: none; }
  ul.browse-course-list a {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    color: var(--text); text-decoration: none; font-size: 13px;
  }
  .browse-icon { flex-shrink: 0; font-size: 16px; }
  .browse-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .browse-time { flex-shrink: 0; color: var(--muted); font-size: 11px; }

  dialog {
    border: none; border-radius: 14px; padding: 0; background: var(--card); color: var(--text);
    width: min(420px, 90vw);
  }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  .dialog-body { padding: 18px; }
  .dialog-body h3 { margin: 0 0 12px; font-size: 16px; }
  .dialog-body label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  .dialog-body input, .dialog-body textarea {
    width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: #0f172a; color: var(--text); font-size: 14px;
  }
  .dialog-actions { display: flex; gap: 8px; margin-top: 16px; }
  .dialog-actions button {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text); font-size: 14px;
  }
  .dialog-actions button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 700; }

  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #111827; color: var(--text); padding: 10px 16px; border-radius: 10px;
    font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s;
    max-width: 90vw; text-align: center; z-index: 50;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>隨時資料庫</h1>
<div class="sub">選課程 → 拍照,自動歸檔到 Google Drive</div>

<div class="card cleanup-card" id="cleanupCard" hidden>
  <h2>⚠️ 待清理提醒</h2>
  <ul class="cleanup-list" id="cleanupList"></ul>
</div>

<div class="card">
  <h2>目前課程</h2>
  <div class="course-toolbar">
    <input type="text" id="courseSearchInput" placeholder="搜尋課程…" disabled>
    <button class="add-course-btn" id="addCourseBtn" title="新增課程" disabled>+</button>
  </div>
  <div class="course-recent" id="courseRecent"></div>
  <div class="course-list" id="courseList"><span class="empty">載入課程清單中…</span></div>
</div>

<div class="card">
  <button class="camera-btn" id="shootBtn" disabled>
    <span class="icon">📷</span><span>拍照上傳</span>
  </button>
  <input type="file" accept="image/*" capture="environment" id="cameraInput" hidden>
  <div class="status-row" id="statusRow">
    <span id="queueInfo">佇列: 0</span>
    <span id="netInfo">連線中</span>
  </div>
</div>

<div class="card">
  <h2>最近上傳</h2>
  <ul class="log" id="logList"><li class="empty">還沒有紀錄</li></ul>
</div>

<div class="footer-links">
  <button class="settings-link" id="openManageCourses">管理課程</button>
  <span class="footer-dot">·</span>
  <button class="settings-link" id="openSettings">連線設定</button>
</div>

<dialog id="settingsDialog">
  <div class="dialog-body">
    <h3>連線設定</h3>
    <label for="gasUrlInput">Apps Script 網址 (GAS_URL)</label>
    <input id="gasUrlInput" placeholder="https://script.google.com/macros/s/xxx/exec">
    <label for="passKeyInput">通行金鑰 (PASS_KEY)</label>
    <input id="passKeyInput" placeholder="setup() 執行紀錄裡的那串">
    <div class="dialog-actions">
      <button id="cancelSettings">取消</button>
      <button class="primary" id="saveSettings">儲存</button>
    </div>
  </div>
</dialog>

<dialog id="addCourseDialog">
  <div class="dialog-body">
    <h3>新增課程</h3>
    <label for="newCourseInput">課程名稱</label>
    <input id="newCourseInput" placeholder="例如:Docker課">
    <div class="dialog-actions">
      <button id="cancelAddCourse">取消</button>
      <button class="primary" id="confirmAddCourse">新增</button>
    </div>
  </div>
</dialog>

<dialog id="manageCoursesDialog">
  <div class="dialog-body">
    <h3>管理課程</h3>
    <ul class="manage-course-list" id="manageCourseList"></ul>
    <div class="dialog-actions">
      <button id="closeManageCourses">關閉</button>
    </div>
  </div>
</dialog>

<dialog id="browseCourseDialog">
  <div class="dialog-body">
    <h3 id="browseCourseTitle">課程內容</h3>
    <ul class="browse-course-list" id="browseCourseList"></ul>
    <div class="dialog-actions">
      <button id="closeBrowseCourse">關閉</button>
    </div>
  </div>
</dialog>

<div id="toast"></div>

<script>
(function () {
  'use strict';

  // ---------- 設定 ----------
  var settings = {
    gasUrl: localStorage.getItem('gasUrl') || '',
    passKey: localStorage.getItem('passKey') || ''
  };

  var courseListEl = document.getElementById('courseList');
  var shootBtn = document.getElementById('shootBtn');
  var cameraInput = document.getElementById('cameraInput');
  var queueInfoEl = document.getElementById('queueInfo');
  var netInfoEl = document.getElementById('netInfo');
  var statusRowEl = document.getElementById('statusRow');
  var logListEl = document.getElementById('logList');
  var toastEl = document.getElementById('toast');
  var settingsDialog = document.getElementById('settingsDialog');
  var addCourseDialog = document.getElementById('addCourseDialog');
  var newCourseInput = document.getElementById('newCourseInput');
  var courseSearchInput = document.getElementById('courseSearchInput');
  var addCourseBtn = document.getElementById('addCourseBtn');
  var courseRecentEl = document.getElementById('courseRecent');
  var manageCoursesDialog = document.getElementById('manageCoursesDialog');
  var manageCourseListEl = document.getElementById('manageCourseList');
  var cleanupCard = document.getElementById('cleanupCard');
  var cleanupListEl = document.getElementById('cleanupList');
  var browseCourseDialog = document.getElementById('browseCourseDialog');
  var browseCourseTitleEl = document.getElementById('browseCourseTitle');
  var browseCourseListEl = document.getElementById('browseCourseList');

  var activeCourse = localStorage.getItem('activeCourse') || '';
  var recentLog = [];

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function () { toastEl.classList.remove('show'); }, 2200);
  }

  function isConfigured() {
    return !!(settings.gasUrl && settings.passKey);
  }

  // ---------- 設定視窗 ----------
  document.getElementById('openSettings').addEventListener('click', function () {
    document.getElementById('gasUrlInput').value = settings.gasUrl;
    document.getElementById('passKeyInput').value = settings.passKey;
    settingsDialog.showModal();
  });
  document.getElementById('cancelSettings').addEventListener('click', function () {
    settingsDialog.close();
  });
  document.getElementById('saveSettings').addEventListener('click', function () {
    var url = document.getElementById('gasUrlInput').value.trim();
    var key = document.getElementById('passKeyInput').value.trim();
    settings.gasUrl = url;
    settings.passKey = key;
    localStorage.setItem('gasUrl', url);
    localStorage.setItem('passKey', key);
    settingsDialog.close();
    toast('設定已儲存');
    refreshCourses();
    updateShootEnabled();
  });

  // ---------- 新增課程視窗 ----------
  addCourseBtn.addEventListener('click', function () {
    if (!isConfigured()) {
      toast('請先填寫連線設定');
      return;
    }
    newCourseInput.value = '';
    addCourseDialog.showModal();
    newCourseInput.focus();
  });
  document.getElementById('cancelAddCourse').addEventListener('click', function () {
    addCourseDialog.close();
  });
  document.getElementById('confirmAddCourse').addEventListener('click', function () {
    var name = newCourseInput.value.trim();
    if (!name) { toast('請輸入課程名稱'); return; }
    if (currentCourses.indexOf(name) !== -1) {
      addCourseDialog.close();
      activeCourse = name;
      localStorage.setItem('activeCourse', name);
      renderCourses(currentCourses);
      return;
    }
    var confirmBtn = document.getElementById('confirmAddCourse');
    confirmBtn.disabled = true;
    fetch(settings.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ passKey: settings.passKey, action: 'addCourse', courseName: name })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        confirmBtn.disabled = false;
        if (data.ok) {
          localStorage.setItem('coursesCache', JSON.stringify(data.courses));
          activeCourse = name;
          localStorage.setItem('activeCourse', name);
          renderCourses(data.courses);
          renderPendingCleanup(data.pending);
          addCourseDialog.close();
          toast('已新增課程「' + name + '」');
        } else {
          toast('新增失敗:' + (data.error || '未知錯誤'));
        }
      })
      .catch(function () {
        confirmBtn.disabled = false;
        toast('離線中,無法新增課程,請連網後再試');
      });
  });

  // ---------- 管理課程視窗 ----------
  document.getElementById('openManageCourses').addEventListener('click', function () {
    if (!isConfigured()) {
      toast('請先填寫連線設定');
      return;
    }
    renderManageCourseList();
    manageCoursesDialog.showModal();
  });
  document.getElementById('closeManageCourses').addEventListener('click', function () {
    manageCoursesDialog.close();
  });

  function renderManageCourseList() {
    manageCourseListEl.innerHTML = '';
    if (currentCourses.length === 0) {
      manageCourseListEl.innerHTML = '<li class="empty">尚無課程</li>';
      return;
    }
    currentCourses.slice().sort(function (a, b) { return a.localeCompare(b, 'zh-Hant'); }).forEach(function (c) {
      var li = document.createElement('li');
      var name = document.createElement('span');
      name.textContent = c;

      var actions = document.createElement('div');
      actions.className = 'manage-actions';

      var browseBtn = document.createElement('button');
      browseBtn.className = 'browse-course-btn';
      browseBtn.textContent = '瀏覽';
      browseBtn.addEventListener('click', function () { openBrowseCourse(c); });

      var delBtn = document.createElement('button');
      delBtn.className = 'delete-course-btn';
      delBtn.textContent = '刪除';
      delBtn.addEventListener('click', function () { removeCourse(c, delBtn); });

      actions.appendChild(browseBtn);
      actions.appendChild(delBtn);
      li.appendChild(name);
      li.appendChild(actions);
      manageCourseListEl.appendChild(li);
    });
  }

  // ---------- 瀏覽課程內容 ----------
  document.getElementById('closeBrowseCourse').addEventListener('click', function () {
    browseCourseDialog.close();
  });

  function openBrowseCourse(name) {
    browseCourseTitleEl.textContent = name;
    browseCourseListEl.innerHTML = '<li class="empty">載入中…</li>';
    browseCourseDialog.showModal();
    fetch(settings.gasUrl + '?action=listFiles&course=' + encodeURIComponent(name) + '&passKey=' + encodeURIComponent(settings.passKey))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) renderBrowseCourseList(data.files);
        else browseCourseListEl.innerHTML = '<li class="empty">載入失敗</li>';
      })
      .catch(function () {
        browseCourseListEl.innerHTML = '<li class="empty">離線中,無法載入</li>';
      });
  }

  function renderBrowseCourseList(files) {
    if (!files || files.length === 0) {
      browseCourseListEl.innerHTML = '<li class="empty">這門課還沒有任何照片或錄音</li>';
      return;
    }
    browseCourseListEl.innerHTML = '';
    files.forEach(function (f) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = f.url;
      a.target = '_blank';
      a.rel = 'noopener';

      var icon = document.createElement('span');
      icon.className = 'browse-icon';
      icon.textContent = f.type === '照片' ? '📷' : (f.type === '錄音' ? '🎙️' : '📄');

      var name = document.createElement('span');
      name.className = 'browse-name';
      name.textContent = f.filename;

      var time = document.createElement('span');
      time.className = 'browse-time';
      time.textContent = formatBrowseTime(f.time);

      a.appendChild(icon);
      a.appendChild(name);
      a.appendChild(time);
      li.appendChild(a);
      browseCourseListEl.appendChild(li);
    });
  }

  function formatBrowseTime(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
    } catch (e) {
      return '';
    }
  }

  function removeCourse(name, btnEl) {
    if (!confirm('確定要刪除課程「' + name + '」嗎?\n(不會刪除已上傳的照片/錄音,只是之後選單不會再顯示)')) return;
    btnEl.disabled = true;
    fetch(settings.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ passKey: settings.passKey, action: 'removeCourse', courseName: name })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) {
          localStorage.setItem('coursesCache', JSON.stringify(data.courses));
          renderCourses(data.courses);
          renderManageCourseList();
          renderPendingCleanup(data.pending);
          toast('已刪除課程「' + name + '」');
        } else {
          btnEl.disabled = false;
          toast('刪除失敗:' + (data.error || '未知錯誤'));
        }
      })
      .catch(function () {
        btnEl.disabled = false;
        toast('離線中,無法刪除課程,請連網後再試');
      });
  }

  // ---------- 待清理提醒 ----------
  function refreshPendingCleanup() {
    if (!isConfigured()) return;
    fetch(settings.gasUrl + '?action=pendingCleanup&passKey=' + encodeURIComponent(settings.passKey))
      .then(function (r) { return r.json(); })
      .then(function (data) { if (data.ok) renderPendingCleanup(data.pending); })
      .catch(function () {}); // 離線時安靜失敗,不影響主要功能
  }

  function renderPendingCleanup(pending) {
    if (!pending || pending.length === 0) {
      cleanupCard.hidden = true;
      return;
    }
    cleanupCard.hidden = false;
    cleanupListEl.innerHTML = '';
    pending.forEach(function (p) {
      var li = document.createElement('li');
      var info = document.createElement('div');
      var name = document.createElement('div');
      name.textContent = p.name;
      var hint = document.createElement('span');
      hint.className = 'hint';
      hint.textContent = '已從清單移除,但 Drive 資料夾還在,記得手動刪除';
      info.appendChild(name);
      info.appendChild(hint);
      var btn = document.createElement('button');
      btn.className = 'dismiss-cleanup-btn';
      btn.textContent = '已清理';
      btn.addEventListener('click', function () { dismissCleanup(p.name, btn); });
      li.appendChild(info);
      li.appendChild(btn);
      cleanupListEl.appendChild(li);
    });
  }

  function dismissCleanup(name, btnEl) {
    btnEl.disabled = true;
    fetch(settings.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ passKey: settings.passKey, action: 'dismissCleanup', courseName: name })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) {
          renderPendingCleanup(data.pending);
          toast('已標記「' + name + '」清理完成');
        } else {
          btnEl.disabled = false;
          toast('操作失敗,請再試一次');
        }
      })
      .catch(function () {
        btnEl.disabled = false;
        toast('離線中,請連網後再試');
      });
  }

  // ---------- 課程清單 ----------
  var RECENT_THRESHOLD = 6; // 課程數超過這個數字才顯示「最近使用」跟搜尋框的必要性提高
  var currentCourses = [];

  function getRecency() {
    try { return JSON.parse(localStorage.getItem('courseRecency') || '{}'); }
    catch (e) { return {}; }
  }
  function touchRecency(name) {
    var rec = getRecency();
    rec[name] = Date.now();
    localStorage.setItem('courseRecency', JSON.stringify(rec));
  }

  function selectCourse(c) {
    activeCourse = c;
    localStorage.setItem('activeCourse', c);
    touchRecency(c);
    renderCourseGrid();
    renderRecent();
  }

  function makeChip(c) {
    var btn = document.createElement('button');
    btn.className = 'course-chip' + (c === activeCourse ? ' active' : '');
    btn.textContent = c;
    btn.addEventListener('click', function () { selectCourse(c); });
    return btn;
  }

  function renderRecent() {
    courseRecentEl.innerHTML = '';
    if (currentCourses.length <= RECENT_THRESHOLD) return;
    var rec = getRecency();
    var recent = currentCourses
      .filter(function (c) { return rec[c]; })
      .sort(function (a, b) { return rec[b] - rec[a]; })
      .slice(0, 4);
    if (recent.length === 0) return;
    var label = document.createElement('span');
    label.className = 'label';
    label.textContent = '最近使用';
    var list = document.createElement('div');
    list.className = 'course-list';
    recent.forEach(function (c) { list.appendChild(makeChip(c)); });
    courseRecentEl.appendChild(label);
    courseRecentEl.appendChild(list);
  }

  function renderCourseGrid() {
    var term = courseSearchInput.value.trim().toLowerCase();
    var sorted = currentCourses.slice().sort(function (a, b) { return a.localeCompare(b, 'zh-Hant'); });
    var filtered = term ? sorted.filter(function (c) { return c.toLowerCase().indexOf(term) !== -1; }) : sorted;

    courseListEl.innerHTML = '';
    if (currentCourses.length === 0) {
      courseListEl.innerHTML = '<span class="empty">尚無課程,點右上角「+」新增</span>';
      return;
    }
    if (filtered.length === 0) {
      courseListEl.innerHTML = '<span class="empty">找不到符合的課程</span>';
      return;
    }
    filtered.forEach(function (c) { courseListEl.appendChild(makeChip(c)); });
  }

  function renderCourses(courses) {
    currentCourses = courses || [];
    courseSearchInput.disabled = false;
    addCourseBtn.disabled = false;

    if (currentCourses.length > 0 && (!activeCourse || currentCourses.indexOf(activeCourse) === -1)) {
      activeCourse = currentCourses[0];
      localStorage.setItem('activeCourse', activeCourse);
    }
    renderRecent();
    renderCourseGrid();
  }

  courseSearchInput.addEventListener('input', renderCourseGrid);

  function refreshCourses() {
    if (!isConfigured()) {
      courseListEl.innerHTML = '<span class="empty">請先點下方「連線設定」填入 Apps Script 網址與金鑰</span>';
      courseSearchInput.disabled = true;
      addCourseBtn.disabled = true;
      return;
    }
    fetch(settings.gasUrl + '?action=courses&passKey=' + encodeURIComponent(settings.passKey))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) {
          localStorage.setItem('coursesCache', JSON.stringify(data.courses));
          renderCourses(data.courses);
        }
      })
      .catch(function () {
        var cached = localStorage.getItem('coursesCache');
        if (cached) {
          renderCourses(JSON.parse(cached));
          toast('離線中,使用上次的課程清單');
        } else {
          courseListEl.innerHTML = '<span class="empty">目前離線且無快取的課程清單</span>';
          courseSearchInput.disabled = true;
          addCourseBtn.disabled = true;
        }
      });
  }

  function updateShootEnabled() {
    shootBtn.disabled = !isConfigured();
  }

  // ---------- IndexedDB 佇列 ----------
  var DB_NAME = 'suishi-db-queue';
  var STORE = 'queue';
  var dbPromise = new Promise(function (resolve, reject) {
    var req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function () {
      req.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = function () { resolve(req.result); };
    req.onerror = function () { reject(req.error); };
  });

  function withStore(mode, fn) {
    return dbPromise.then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(STORE, mode);
        var store = tx.objectStore(STORE);
        var result = fn(store);
        tx.oncomplete = function () { resolve(result); };
        tx.onerror = function () { reject(tx.error); };
      });
    });
  }

  function queueAdd(item) {
    return withStore('readwrite', function (store) { store.add(item); });
  }
  function queueDelete(id) {
    return withStore('readwrite', function (store) { store.delete(id); });
  }
  function queueAll() {
    return dbPromise.then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).getAll();
        req.onsuccess = function () { resolve(req.result); };
        req.onerror = function () { reject(req.error); };
      });
    });
  }

  // ---------- 上傳 ----------
  function uploadItem(item) {
    // 用 text/plain 避免瀏覽器對 GAS 發出 CORS 預檢請求 (GAS 不支援 OPTIONS)
    return fetch(settings.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        passKey: settings.passKey,
        filename: item.filename,
        mimeType: item.mimeType,
        base64Data: item.base64Data,
        tag: item.tag
      })
    }).then(function (r) { return r.json(); });
  }

  function pushLog(entry) {
    recentLog.unshift(entry);
    recentLog = recentLog.slice(0, 8);
    renderLog();
  }

  function renderLog() {
    if (recentLog.length === 0) {
      logListEl.innerHTML = '<li class="empty">還沒有紀錄</li>';
      return;
    }
    logListEl.innerHTML = '';
    recentLog.forEach(function (e) {
      var li = document.createElement('li');
      var name = document.createElement('span');
      name.className = 'name';
      name.textContent = e.tag + ' · ' + e.time;
      var state = document.createElement('span');
      state.className = 'state ' + e.state;
      state.textContent = e.state === 'ok' ? '已上傳' : e.state === 'pending' ? '排隊中' : '失敗,等重試';
      li.appendChild(name);
      li.appendChild(state);
      logListEl.appendChild(li);
    });
  }

  function refreshQueueInfo() {
    queueAll().then(function (all) {
      queueInfoEl.textContent = '佇列: ' + all.length;
      statusRowEl.classList.toggle('warn', all.length > 0);
    });
  }

  var processing = false;
  function processQueue() {
    if (processing || !navigator.onLine || !isConfigured()) return;
    processing = true;
    queueAll().then(function (all) {
      if (all.length === 0) { processing = false; return; }
      var chain = Promise.resolve();
      all.forEach(function (item) {
        chain = chain.then(function () {
          return uploadItem(item)
            .then(function (res) {
              if (res.ok) {
                return queueDelete(item.id).then(function () {
                  pushLog({ tag: item.tag, time: item.time, state: 'ok' });
                });
              } else {
                pushLog({ tag: item.tag, time: item.time, state: 'err' });
              }
            })
            .catch(function () {
              // 網路問題,留在佇列裡,之後自動重試
            });
        });
      });
      chain.then(function () {
        processing = false;
        refreshQueueInfo();
      });
    });
  }

  // ---------- 拍照 ----------
  shootBtn.addEventListener('click', function () { cameraInput.click(); });

  cameraInput.addEventListener('change', function () {
    var file = cameraInput.files[0];
    cameraInput.value = '';
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function () {
      var base64Data = reader.result.split(',')[1];
      var now = new Date();
      var stamp = now.toLocaleString('zh-TW', { hour12: false });
      var item = {
        filename: 'photo_' + now.getTime() + '.jpg',
        mimeType: file.type || 'image/jpeg',
        base64Data: base64Data,
        tag: activeCourse || '未分類',
        time: stamp
      };
      queueAdd(item).then(function () {
        pushLog({ tag: item.tag, time: item.time, state: 'pending' });
        refreshQueueInfo();
        processQueue();
      });
    };
    reader.readAsDataURL(file);
  });

  // ---------- 連線狀態 ----------
  function updateNetInfo() {
    netInfoEl.textContent = navigator.onLine ? '連線中' : '離線';
  }
  window.addEventListener('online', function () {
    updateNetInfo();
    toast('已恢復連線,補傳佇列中的照片');
    processQueue();
  });
  window.addEventListener('offline', updateNetInfo);
  setInterval(processQueue, 20000);

  // ---------- 啟動 ----------
  updateShootEnabled();
  updateNetInfo();
  refreshQueueInfo();
  refreshCourses();
  refreshPendingCleanup();
  processQueue();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function () {});
  }
})();
</script>
</body>
</html>
